# ================================================================
# Collector 服务配置 (Spring Boot application.yml)
# ================================================================

server:
  # 服务监听端口
  port: 8080

spring:
  application:
    name: hadp-collector
  jackson:
    # JSON 日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    # 忽略 JSON 中多余的字段（不抛出异常）
    deserialization:
      fail-on-unknown-properties: false

# ==================== Hadoop HDFS 配置 ====================
hadoop:
  hdfs:
    # HDFS NameNode 地址
    # Docker 环境：hdfs://namenode:9000
    # 本地开发  ：hdfs://localhost:9000
    uri: hdfs://hadoop:9000
    # 日志存储在 HDFS 上的根目录
    log-path: /user/hadp/logs

# ==================== 日志配置 ====================
logging:
  level:
    # 项目包的日志级别
    com.hadp: DEBUG
    # 减少 Hadoop 框架的日志输出
    org.apache.hadoop: WARN
    org.apache.hbase: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
