# Log4j 配置（Hadoop 默认使用 Log4j 1.x）
# 控制 MapReduce 任务的日志输出

# 根日志级别
log4j.rootLogger=INFO, console

# 控制台输出
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# 项目代码日志级别（DEBUG 可以看到更多细节）
log4j.logger.com.hadp=DEBUG

# 减少 Hadoop 内部日志噪音
log4j.logger.org.apache.hadoop=WARN
log4j.logger.org.apache.hadoop.mapreduce=INFO
log4j.logger.org.apache.hadoop.hdfs=WARN
log4j.logger.org.apache.hadoop.yarn=WARN

# 减少 HBase 内部日志噪音
log4j.logger.org.apache.hadoop.hbase=WARN
log4j.logger.org.apache.zookeeper=WARN
